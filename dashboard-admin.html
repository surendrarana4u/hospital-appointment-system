<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      (function() {
        const token = localStorage.getItem('hms_token');
        const user = JSON.parse(localStorage.getItem('hms_user') || 'null');
        if (!token || !user || user.role !== 'admin') {
          localStorage.removeItem('hms_token');
          localStorage.removeItem('hms_user');
          window.location.href = 'index.html';
        }
      })();
    <\/script>
    <title>Admin Dashboard - MediCare Plus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-bg-3d">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        <div class="floating-orb orb-4"></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>MediCare Plus</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="#overview" class="nav-item active" data-section="overview">
                <i class="fas fa-th-large"></i><span>Overview</span>
            </a>
            <a href="#staff" class="nav-item" data-section="staff">
                <i class="fas fa-users-cog"></i><span>Staff Management</span>
            </a>
            <a href="#create-staff" class="nav-item" data-section="create-staff">
                <i class="fas fa-user-plus"></i><span>Create Account</span>
            </a>
            <a href="#reports" class="nav-item" data-section="reports">
                <i class="fas fa-chart-bar"></i><span>Reports</span>
            </a>
            <a href="#settings" class="nav-item" data-section="settings">
                <i class="fas fa-cog"></i><span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1>Admin Dashboard</h1>
            </div>
            <div class="top-bar-right">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i><span class="badge">15</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
                    <div class="user-details">
                        <p class="user-name">System Admin</p>
                        <p class="user-id">Admin-001</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <section id="overview" class="dashboard-section active">
                <div class="section-header">
                    <h2>System Overview</h2>
                    <p>Complete hospital management summary</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                        <div class="stat-info"><h3>1,245</h3><p>Total Patients</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon green"><i class="fas fa-user-md"></i></div>
                        <div class="stat-info"><h3>52</h3><p>Active Doctors</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon orange"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-info"><h3>₹8.5L</h3><p>Monthly Revenue</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon purple"><i class="fas fa-calendar-check"></i></div>
                        <div class="stat-info"><h3>385</h3><p>Appointments This Week</p></div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header"><h3><i class="fas fa-user-md"></i> Staff Distribution</h3></div>
                        <div class="card-body">
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-user-md"></i></div>
                                <div class="prescription-details"><h4>Doctors</h4><p>52 active</p></div>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-concierge-bell"></i></div>
                                <div class="prescription-details"><h4>Reception</h4><p>8 active</p></div>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-pills"></i></div>
                                <div class="prescription-details"><h4>Pharmacy</h4><p>12 active</p></div>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-flask"></i></div>
                                <div class="prescription-details"><h4>Laboratory</h4><p>15 active</p></div>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-card">
                        <div class="card-header"><h3><i class="fas fa-chart-line"></i> Recent Activity</h3></div>
                        <div class="card-body">
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-user-plus"></i></div>
                                <div class="prescription-details">
                                    <h4>New Patient Registered</h4>
                                    <p>John Doe - P-1245</p>
                                    <span class="date">2 minutes ago</span>
                                </div>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-file-prescription"></i></div>
                                <div class="prescription-details">
                                    <h4>Prescription Created</h4>
                                    <p>Dr. Smith - Patient P-001</p>
                                    <span class="date">15 minutes ago</span>
                                </div>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-money-bill-wave"></i></div>
                                <div class="prescription-details">
                                    <h4>Payment Verified</h4>
                                    <p>₹2,500 - Reception-001</p>
                                    <span class="date">1 hour ago</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="staff" class="dashboard-section">
                <div class="section-header">
                    <h2>Staff Management</h2>
                    <p>Manage all hospital staff accounts</p>
                </div>
                <div class="reports-table-wrapper card-3d-hover">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Role</th>
                                <th>ID</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                                    <button class="btn-icon"><i class="fas fa-eye"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="create-staff" class="dashboard-section">
                <div class="section-header">
                    <h2>Create Staff Account</h2>
                    <p>Create new accounts for hospital staff</p>
                </div>
                <div class="profile-card card-3d-hover">
                    <form id="staffForm" class="prescription-form">
                        <div class="form-section">
                            <h4><i class="fas fa-user"></i> Staff Information</h4>
                            <div class="form-row">
                                <div class="form-group-3d">
                                    <label>Full Name</label>
                                    <input type="text" id="staffName" required>
                                </div>
                                <div class="form-group-3d">
                                    <label>Role</label>
                                    <select id="staffRole" required>
                                        <option value="">Select Role</option>
                                        <option value="doctor">Doctor</option>
                                        <option value="reception">Reception</option>
                                        <option value="pharma">Pharmacy</option>
                                        <option value="labs">Laboratory</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group-3d">
                                    <label>Phone Number</label>
                                    <input type="tel" id="staffPhone" required>
                                </div>
                                <div class="form-group-3d">
                                    <label>Email</label>
                                    <input type="email" id="staffEmail" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group-3d">
                                    <label>Specialty (For Doctors)</label>
                                    <input type="text" id="staffSpecialty" placeholder="e.g., Cardiology">
                                </div>
                                <div class="form-group-3d">
                                    <label>Password</label>
                                    <input type="password" id="staffPassword" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-3d btn-primary">
                                <i class="fas fa-user-plus"></i> Create Account
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <section id="reports" class="dashboard-section">
                <div class="section-header">
                    <h2>System Reports</h2>
                    <p>Generate and view hospital reports</p>
                </div>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header"><h3><i class="fas fa-file-alt"></i> Available Reports</h3></div>
                        <div class="card-body">
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-users"></i></div>
                                <div class="prescription-details">
                                    <h4>Patient Report</h4>
                                    <p>Total patients, demographics</p>
                                </div>
                                <button class="btn-icon" onclick="generateReport('patient')"><i class="fas fa-download"></i></button>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-rupee-sign"></i></div>
                                <div class="prescription-details">
                                    <h4>Revenue Report</h4>
                                    <p>Monthly income, breakdown</p>
                                </div>
                                <button class="btn-icon" onclick="generateReport('revenue')"><i class="fas fa-download"></i></button>
                            </div>
                            <div class="prescription-item">
                                <div class="prescription-icon"><i class="fas fa-calendar-check"></i></div>
                                <div class="prescription-details">
                                    <h4>Appointment Report</h4>
                                    <p>Appointments, no-shows</p>
                                </div>
                                <button class="btn-icon" onclick="generateReport('appointment')"><i class="fas fa-download"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="settings" class="dashboard-section">
                <div class="section-header">
                    <h2>System Settings</h2>
                    <p>Configure hospital system settings</p>
                </div>
                <div class="profile-card card-3d-hover">
                    <div class="profile-details">
                        <div class="detail-group">
                            <h4><i class="fas fa-hospital"></i> Hospital Information</h4>
                            <div class="detail-item"><span>Hospital Name:</span><strong>MediCare Plus</strong></div>
                            <div class="detail-item"><span>Address:</span><strong>123 Medical Center Drive</strong></div>
                            <div class="detail-item"><span>Phone:</span><strong>+91 9876543210</strong></div>
                        </div>
                        <div class="detail-group">
                            <h4><i class="fas fa-cog"></i> System Configuration</h4>
                            <div class="detail-item"><span>OTP Service:</span><strong>Twilio</strong></div>
                            <div class="detail-item"><span>Database:</span><strong>MongoDB</strong></div>
                            <div class="detail-item"><span>Storage:</span><strong>GridFS</strong></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
