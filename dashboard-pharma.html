<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      (function() {
        const token = localStorage.getItem('hms_token');
        const user = JSON.parse(localStorage.getItem('hms_user') || 'null');
        if (!token || !user || user.role !== 'pharma') {
          localStorage.removeItem('hms_token');
          localStorage.removeItem('hms_user');
          window.location.href = 'index.html';
        }
      })();
    <\/script>
    <title>Pharma Dashboard - MediCare Plus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-bg-3d">
        <div class="floating-orb orb-1"></div>
        <div class="floating-orb orb-2"></div>
        <div class="floating-orb orb-3"></div>
        <div class="floating-orb orb-4"></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>MediCare Plus</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="#overview" class="nav-item active" data-section="overview">
                <i class="fas fa-th-large"></i><span>Overview</span>
            </a>
            <a href="#prescriptions" class="nav-item" data-section="prescriptions">
                <i class="fas fa-file-prescription"></i><span>Prescriptions</span>
            </a>
            <a href="#orders" class="nav-item" data-section="orders">
                <i class="fas fa-shopping-cart"></i><span>Orders</span>
            </a>
            <a href="#billing" class="nav-item" data-section="billing">
                <i class="fas fa-file-invoice-dollar"></i><span>Billing</span>
            </a>
            <a href="#inventory" class="nav-item" data-section="inventory">
                <i class="fas fa-boxes"></i><span>Inventory</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1>Pharma Dashboard</h1>
            </div>
            <div class="top-bar-right">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i><span class="badge">8</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-pills"></i></div>
                    <div class="user-details">
                        <p class="user-name">MediCare Pharmacy</p>
                        <p class="user-id">Pharma-001</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <section id="overview" class="dashboard-section active">
                <div class="section-header">
                    <h2>Pharmacy Overview</h2>
                    <p>Prescription orders and dispensing summary</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon blue"><i class="fas fa-file-prescription"></i></div>
                        <div class="stat-info"><h3>24</h3><p>New Prescriptions</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                        <div class="stat-info"><h3>12</h3><p>Pending Orders</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info"><h3>156</h3><p>Completed Today</p></div>
                    </div>
                    <div class="stat-card card-3d-hover">
                        <div class="stat-icon purple"><i class="fas fa-rupee-sign"></i></div>
                        <div class="stat-info"><h3>₹45,600</h3><p>Today's Revenue</p></div>
                    </div>
                </div>
            </section>

            <section id="prescriptions" class="dashboard-section">
                <div class="section-header">
                    <h2>Incoming Prescriptions</h2>
                    <p>Prescriptions from doctors waiting to be processed</p>
                </div>
                <div class="reports-table-wrapper card-3d-hover">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Patient</th>
                                <th>Doctor</th>
                                <th>Date</th>
                                <th>Medications</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pharmaPrescriptionsTableBody">
                            <!-- Prescriptions will be loaded here dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="orders" class="dashboard-section">
                <div class="section-header">
                    <h2>Order Management</h2>
                    <p>Track and manage medication orders</p>
                </div>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header"><h3><i class="fas fa-clock"></i> Pending Orders</h3></div>
                        <div class="card-body" id="pharmaPendingOrders">
                            <!-- Pending orders loaded dynamically -->
                        </div>
                    </div>
                    <div class="dashboard-card">
                        <div class="card-header"><h3><i class="fas fa-check-circle"></i> Completed Today</h3></div>
                        <div class="card-body" id="pharmaCompletedOrders">
                            <!-- Completed orders loaded dynamically -->
                        </div>
                    </div>
                </div>
            </section>

            <section id="billing" class="dashboard-section">
                <div class="section-header">
                    <h2>Billing & Receipts</h2>
                    <p>Generate bills and send receipts to patients</p>
                </div>
                <div class="bills-list">
                    <div class="bill-card card-3d-hover">
                        <div class="bill-header">
                            <div class="bill-type">
                                <i class="fas fa-receipt"></i>
                                <div><h4>Bill #PH-1234</h4><p>John Doe - P-001</p></div>
                            </div>
                            <span class="status-badge pending">Unpaid</span>
                        </div>
                        <div class="bill-body">
                            <div class="bill-detail"><span>Medications:</span><strong>Amlodipine, Losartan</strong></div>
                            <div class="bill-detail"><span>Amount:</span><strong class="amount">₹1,800</strong></div>
                            <div class="bill-detail"><span>Date:</span><strong>April 15, 2026</strong></div>
                        </div>
                        <div class="bill-actions">
                            <button class="btn-3d btn-small btn-primary" onclick="generateBill('PH-1234')">
                                <i class="fas fa-file-invoice"></i> Generate Receipt
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="inventory" class="dashboard-section">
                <div class="section-header">
                    <h2>Medicine Inventory</h2>
                    <p>Track stock levels and manage inventory</p>
                </div>
                <div class="reports-table-wrapper card-3d-hover">
                    <table class="data-table">
                        <thead>
                            <tr><th>Medicine</th><th>Stock</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><strong>Amlodipine 5mg</strong></td>
                                <td>500 tablets</td>
                                <td><span class="status-badge completed">In Stock</span></td>
                                <td><button class="btn-icon"><i class="fas fa-edit"></i></button></td>
                            </tr>
                            <tr>
                                <td><strong>Losartan 50mg</strong></td>
                                <td>50 tablets</td>
                                <td><span class="status-badge pending">Low Stock</span></td>
                                <td><button class="btn-icon"><i class="fas fa-plus"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
